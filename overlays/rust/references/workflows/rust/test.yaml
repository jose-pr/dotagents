name: Test

# On-demand / ad-hoc test workflow, kept separate from release.yaml's own
# release-gate test job -- same two-trigger pattern as the Python template:
# workflow_dispatch (with ref input) + throwaway "ci-*" tags (delete after).
# Not triggered by push/PR on branches by default.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to test (branch, tag, or SHA)"
        required: false
        default: ""
  push:
    tags:
      - "ci-*"

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.toolchain }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # stable + the Cargo.toml-declared MSRV -- both must pass, the same
        # way Python matrices over its oldest supported version.
        toolchain: [stable, "<msrv>"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      # dtolnay/rust-toolchain, not actions-rs (unmaintained) -- see kb/RUST.md.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-features -- -D warnings
      - name: Run tests
        run: cargo test --all-features
