name: Docs

# Builds the API reference + docs site and deploys it to GitHub Pages. Kept
# separate from release.yaml (D52 -- three workflow files: test, release, docs)
# so the docs site can be rebuilt/redeployed without cutting a release, and a
# release is not the first time the docs build is exercised. This workflow owns
# ALL Pages deploys (main = latest, release = the version just shipped):
# release.yaml builds + GATES on `npm run docs` and creates the release object;
# publishing that release fires `release: published`, which triggers THIS
# workflow to deploy -- so the release path never deploys Pages itself (see
# release.yaml's docs-gate). It self-enables Pages (configure-pages) on every run.
#
# Triggers:
#   - release published (a v* release ships its matching docs).
#   - push to the default branch touching docs sources (keeps Pages current).
#   - workflow_dispatch, for a manual redeploy against any ref.
on:
  release:
    types: [published]
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "src/**"
      - "typedoc.json"
      - ".github/workflows/docs.yaml"
  workflow_dispatch:

permissions:
  contents: read

# Serialize deploys; never cancel an in-flight Pages deploy mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs-build:
    name: Build documentation site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/configure-pages@v5
      - run: npm ci
      # TypeDoc outputs to docs/api/ -- never point it at docs/ itself, it
      # would clobber the hand-written landing page (see kb/NODE.md).
      - name: Build API reference + site
        run: npm run docs
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  docs-deploy:
    name: Deploy documentation to GitHub Pages
    needs: docs-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
