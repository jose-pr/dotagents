name: Release

# Runs when a version tag (e.g. v1.0.0, v1.0.0-rc.1) is pushed. Not wired to
# push/PR events on branches -- this is a release gate, not general CI.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.13"] # oldest + newest supported
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with all extras
        run: python -m pip install -e ".[dev,<extras-with-tests>]"
      - name: Run tests
        run: python -m pytest -q

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install build tooling
        run: python -m pip install --upgrade build
      - name: Build sdist and wheel
        run: python -m build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Docs are DEPLOYED by docs.yml (D52 -- three workflow files). This job only
  # GATES the release on a strict docs build: a release must never ship if the
  # docs site is broken, but the release path never deploys Pages itself.
  # Ordering: this workflow builds + gates + creates the release object; that
  # release's `published` event then triggers docs.yml, which deploys the docs
  # for the version just shipped.
  docs-gate:
    name: Docs build gate (strict, no deploy)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install package with docs tooling
        run: python -m pip install -e ".[dev,docs,<extras-with-tests>]"
      - name: Build docs (gate only)
        run: mkdocs build --strict

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Extract CHANGELOG.md section for this tag
        shell: python
        run: |
          import pathlib
          import re
          import sys

          tag = "${{ github.ref_name }}"
          version = tag[1:] if tag.startswith("v") else tag  # v1.0.0-rc.1 -> 1.0.0-rc.1

          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          # Stop before the next "## [version]" heading, or before the
          # trailing "[version]: https://..." reference-link block at the
          # end of the file (only relevant when this tag is the oldest
          # tracked release, so there's no next heading to stop at).
          match = re.search(
              rf"^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|^\[[^\]]+\]:\s|\Z)",
              changelog,
              re.DOTALL | re.MULTILINE,
          )
          if not match:
              sys.exit(f"No CHANGELOG.md section found for version {version!r}")
          pathlib.Path("release_notes.md").write_text(match.group(1).strip() + "\n", encoding="utf-8")
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          # A repo that pushes commits directly (no PR flow) gets a thin/empty
          # auto-generated "What's Changed" on every release, not just the
          # first -- the scraped CHANGELOG.md section is the real notes.
          # generate_release_notes still runs and appends its own
          # "Full Changelog: <compare link>" line after body_path's content.
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: release_notes.md

  publish-pypi:
    name: Publish to PyPI
    needs: github-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/<project_name>/
    permissions:
      id-token: write # required for PyPI Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # A partially-completed release re-run must not hard-fail on files
          # already uploaded (PyPI never lets a version be replaced); skip them
          # and publish only what's missing.
          skip-existing: true
