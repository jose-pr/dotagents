name: Docs

# Builds the docs site and deploys it to GitHub Pages. Kept separate from
# release.yml (D52 -- three workflow files: test, release, docs) so the docs
# site can be rebuilt/redeployed without cutting a release, and a release is
# not the first time the docs build is exercised. release.yml still runs
# `mkdocs build --strict` as a gate, but only this workflow deploys.
#
# Triggers:
#   - push to the default branch touching docs sources (keeps Pages current).
#   - workflow_dispatch, for a manual redeploy against any ref.
on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

# Serialize deploys; never cancel an in-flight Pages deploy mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs-build:
    name: Build documentation site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: actions/configure-pages@v5
      - name: Install package with docs tooling
        run: python -m pip install -e ".[dev,docs,<extras-with-tests>]"
      - name: Build docs
        run: mkdocs build --strict
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  docs-deploy:
    name: Deploy documentation to GitHub Pages
    needs: docs-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
