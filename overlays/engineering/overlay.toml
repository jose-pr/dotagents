name = "engineering"
description = "Opinionated always-on engineering discipline: commit shape, release-tag consent, benchmark evidence, token discipline, draft follow-ups."
requires = []
routing = []

# These are always-on RULES, not load-on-demand routing. The installer is
# copy-only today (D36) and has no mechanism to merge them into AGENTS.md's
# managed block, so applying this overlay means pasting `rules.md` into your
# own `~/.agents/AGENTS.md` under "Always-on rules". Tracked here so the text
# is versioned rather than hand-edited into the install target and lost on the
# next rebuild -- see the finding
# `overlays_cannot_contribute_agents_md_rules`.
rules = [
  "engineering/rules.md",
]
