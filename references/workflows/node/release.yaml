name: Release

# Runs when a version tag (e.g. v1.0.0, v1.0.0-rc.1) is pushed. Not wired to
# push/PR events on branches -- this is a release gate, not general CI.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test (node ${{ matrix.node-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ["18", "22"] # oldest + newest supported LTS
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Pack tarball
        run: npm pack
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: "*.tgz"

  docs-build:
    name: Build documentation site
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/configure-pages@v5
      - run: npm ci
      # TypeDoc outputs to docs/api/ -- never point it at docs/ itself, it
      # would clobber the hand-written landing page (see kb/NODE.md).
      - name: Build API reference + site
        run: npm run docs
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  docs-deploy:
    name: Deploy documentation to GitHub Pages
    needs: docs-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      # Identical Python inline scraper as the python template -- ubuntu-latest
      # runners bundle Python 3 regardless of project language; never
      # reimplement this per language (see flows/REPO.md).
      - name: Extract CHANGELOG.md section for this tag
        shell: python
        run: |
          import pathlib
          import re
          import sys

          tag = "${{ github.ref_name }}"
          version = tag[1:] if tag.startswith("v") else tag  # v1.0.0-rc.1 -> 1.0.0-rc.1

          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          # Stop before the next "## [version]" heading, or before the
          # trailing "[version]: https://..." reference-link block at the
          # end of the file (only relevant when this tag is the oldest
          # tracked release, so there's no next heading to stop at).
          match = re.search(
              rf"^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|^\[[^\]]+\]:\s|\Z)",
              changelog,
              re.DOTALL | re.MULTILINE,
          )
          if not match:
              sys.exit(f"No CHANGELOG.md section found for version {version!r}")
          pathlib.Path("release_notes.md").write_text(match.group(1).strip() + "\n", encoding="utf-8")
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: release_notes.md

  publish-npm:
    name: Publish to npm
    needs: github-release
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/<project_name>
    permissions:
      id-token: write # OIDC provenance attestation (npm >= 9.5)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      # npm has been rolling out token-free Trusted Publishing -- verify the
      # current recommended setup on npmjs.com at release time before assuming
      # the NODE_AUTH_TOKEN fallback below is still needed (see kb/NODE.md).
      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
