name: Release

# Runs when a version tag (e.g. v1.0.0, v1.0.0-rc.1) is pushed. Not wired to
# push/PR events on branches -- this is a release gate, not general CI.
#
# It tests, builds the sdist/wheel, builds the self-contained `dotagents.pyz`,
# gates on a strict docs build, then creates the GitHub Release and attaches
# the artifacts (including `dotagents.pyz`, so
# https://github.com/jose-pr/dotagents/releases/latest/download/dotagents.pyz
# always resolves to the newest release's pyz). No PyPI publish yet.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.13"] # oldest + newest supported
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev extras
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest tests/ -q

  build:
    name: Build distribution (sdist + wheel + pyz)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install build tooling
        run: python -m pip install --upgrade build
      - name: Build sdist and wheel
        run: python -m build
      # The pyz is a first-class release artifact -- the no-pip install path.
      # `build-pyz` bundles duho/pathlib_next and the required tools/, so it
      # needs the package importable (editable install) to run the command.
      - name: Build dotagents.pyz
        run: |
          python -m pip install -e .
          python -m dotagents build-pyz --out dist/dotagents.pyz
          python dist/dotagents.pyz --version
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Docs are DEPLOYED by docs.yml (D52 -- three workflow files). This job only
  # GATES the release on a strict docs build: a release must never ship if the
  # docs site is broken, but the release path never deploys Pages itself.
  # Ordering: this workflow builds + gates + creates the release object; that
  # release's `published` event then triggers docs.yml, which deploys the docs
  # for the version just shipped.
  docs-gate:
    name: Docs build gate (strict, no deploy)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install package with docs tooling
        run: python -m pip install -e ".[docs]"
      - name: Build docs (gate only)
        run: mkdocs build --strict

  github-release:
    name: Create GitHub Release
    needs: [build, docs-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Extract CHANGELOG.md section for this tag
        shell: python
        run: |
          import pathlib
          import re
          import sys

          tag = "${{ github.ref_name }}"
          version = tag[1:] if tag.startswith("v") else tag  # v1.0.0-rc.1 -> 1.0.0-rc.1

          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          # Stop before the next "## [version]" heading, or before the
          # trailing "[version]: https://..." reference-link block at the
          # end of the file (only relevant when this tag is the oldest
          # tracked release, so there's no next heading to stop at).
          match = re.search(
              rf"^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|^\[[^\]]+\]:\s|\Z)",
              changelog,
              re.DOTALL | re.MULTILINE,
          )
          if not match:
              sys.exit(f"No CHANGELOG.md section found for version {version!r}")
          pathlib.Path("release_notes.md").write_text(match.group(1).strip() + "\n", encoding="utf-8")
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          # Pin the release object to the tagged commit; left unset it defaults
          # to the repo's default branch and every later release can fail note
          # generation with "Invalid target_commitish" after a branch rename.
          target_commitish: ${{ github.sha }}
          # A repo that pushes commits directly (no PR flow) gets a thin/empty
          # auto-generated "What's Changed" on every release -- the scraped
          # CHANGELOG.md section is the real notes; generate_release_notes still
          # appends its own "Full Changelog: <compare link>" after body_path.
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: release_notes.md
