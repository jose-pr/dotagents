name: Test

# Validates the config: manifest completeness, forbidden patterns, template
# instantiation, and a clean install (base + overlays) into a scratch HOME.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to test (branch, tag, or SHA)"
        required: false
        default: ""
  push:
    tags:
      - "ci-*"
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"] # default mode must run on the 3.9 floor
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Audit config manifest
        run: python tools/audit_config.py --root .
      - name: Repo hygiene scan (no personal leftovers in tracked files)
        run: python tools/audit_config.py --repo-hygiene .
      - name: Template instantiation checks (3.11+ only)
        if: matrix.python-version != '3.9'
        run: python tools/audit_config.py --check-templates --root .

  install:
    name: Install into scratch HOME
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch example overlays (separate branch)
        # The example overlays live on the `overlays` orphan branch, not in main's
        # tree (D77). Check them out into ./overlays-src so the overlays-command
        # integration steps below can resolve them via --source overlays-src/overlays
        # (the branch keeps them at overlays/<name>/). The pure-unit pytest step
        # below uses tmp fixtures and needs none of this.
        uses: actions/checkout@v4
        with:
          ref: overlays
          path: overlays-src
      - name: Install the dotagents CLI package
        run: python -m pip install -e .
      - name: Unit tests (agent registry + context generator, plans 00/04)
        run: |
          python -m pip install pytest
          python -m pytest tests/ -q
      - name: Dry run (minimal base overlay via init)
        run: python install.py init --dry-run
      - name: Init lays down the base overlay only
        run: |
          export HOME="$(mktemp -d)"
          python install.py init
          test -f "$HOME/.agents/AGENTS.md"
          test -f "$HOME/.agents/dotagents/DECISIONS.md"
          test ! -e "$HOME/.agents/flows"        # base imposes no flows
      - name: Install base + opt-in overlays by name (overlay dirs)
        run: |
          export HOME="$(mktemp -d)"
          python install.py init
          python -m dotagents overlays add flows references python --source overlays-src/overlays -g
          test -f "$HOME/.agents/AGENTS.md"
          test -f "$HOME/.agents/overlays/flows/flows/PLAN.md"
          test -f "$HOME/.agents/overlays/python/kb/PYTHON.md"
      - name: Re-adding an overlay is idempotent (skips present files)
        run: |
          export HOME="$(mktemp -d)"
          python install.py init
          python -m dotagents overlays add flows --source overlays-src/overlays -g
          python -m dotagents overlays add flows --source overlays-src/overlays -g | grep -q "skip (exists)"
      - name: overlays add/list/remove into a scope (discover, not track)
        run: |
          export HOME="$(mktemp -d)"
          python install.py init                                   # lay the base AGENTS.md
          # add by name from the bundled source, into the user scope.
          python -m dotagents overlays add python --source overlays-src/overlays -g
          test -f "$HOME/.agents/overlays/python/kb/PYTHON.md"     # installed as a dir
          test -f "$HOME/.agents/overlays/python/overlay.toml"     # self-describing
          grep -q "kb/PYTHON.md" "$HOME/.agents/AGENTS.md"         # D59 routing merged
          # list discovers it by presence (no registry file).
          python -m dotagents overlays list --source overlays-src/overlays -g | grep -q "python"
          python -m dotagents overlays list --source overlays-src/overlays -g --json | grep -q '"installed"'
          # glob-filtered sync is a no-op-safe refresh.
          python -m dotagents overlays sync 'py*' --source overlays-src/overlays -g
          # remove deletes the overlay dir (+ warns about the AGENTS.md rules prune).
          python -m dotagents overlays remove python -g 2>&1 | grep -qi "NOT auto-removed"
          test ! -e "$HOME/.agents/overlays/python"
      - name: Link a project into the private store, then sync (git bootstrap)
        run: |
          export HOME="$(mktemp -d)"
          git config --global user.email ci@example.invalid
          git config --global user.name CI
          python install.py init
          python -m dotagents overlays add private-sync --source overlays-src/overlays -g
          test -f "$HOME/.agents/overlays/private-sync/kb/PRIVATE_SYNC.md"
          test -f "$HOME/.agents/overlays/private-sync/hooks/private-sync-start.sh"
          # A project with an existing .agents is adopted into the store and symlinked.
          proj="$(mktemp -d)"
          mkdir -p "$proj/.agents/plans"
          echo "seed" > "$proj/.agents/plans/seed.md"
          printf '.agents/\n' > "$proj/.gitignore"
          python -m dotagents link "$proj"
          test -L "$proj/.agents"                              # symlinked
          test -f "$HOME/.agents/projects/$(basename "$proj")/plans/seed.md"  # adopted
          cat "$proj/.agents/plans/seed.md" | grep -q seed     # reachable through the link
          python -m dotagents link "$proj" | grep -q "already" # idempotent
          # Bootstrap the private repo as git and commit the store.
          python -m dotagents sync --remote https://example.invalid/you/.agents.git --no-pull --no-push -m "init"
          git -C "$HOME/.agents" ls-files | grep -q "projects/$(basename "$proj")/plans/seed.md"
      - name: A .agents that is itself a git checkout is never adopted or copied back
        run: |
          export HOME="$(mktemp -d)"
          git config --global user.email ci@example.invalid
          git config --global user.name CI
          python install.py init
          proj="$(mktemp -d)"; printf '.agents\n' > "$proj/.gitignore"
          git init -q "$proj/.agents"
          echo "checkout" > "$proj/.agents/AGENTS.md"
          git -C "$proj/.agents" add -A && git -C "$proj/.agents" commit -qm seed
          python -m dotagents link "$proj" | grep -q "skip:"
          test -d "$proj/.agents" && test ! -L "$proj/.agents"   # left in place, untouched
          test ! -e "$HOME/.agents/projects/$(basename "$proj")/AGENTS.md"  # not adopted
          python -m dotagents sync --project "$proj" --remote https://example.invalid/you/.agents.git --no-pull --no-push -m "sync" | grep -q "skip copy-back"
          test ! -e "$HOME/.agents/projects/$(basename "$proj")/AGENTS.md"  # not copied back
          # --force backs the checkout up (git state intact) and links the store.
          python -m dotagents link "$proj" --force
          test -L "$proj/.agents"
          test -d "$proj/.agents.bak/.git"
      - name: Copy-mode link + copy-back on sync (no-symlink fallback path)
        run: |
          export HOME="$(mktemp -d)"
          git config --global user.email ci@example.invalid
          git config --global user.name CI
          python install.py init
          proj="$(mktemp -d)"; printf '.agents/\n' > "$proj/.gitignore"
          python -m dotagents link "$proj" --copy
          test -d "$proj/.agents" && test ! -L "$proj/.agents"  # real dir, not a symlink
          echo "edit" > "$proj/.agents/plans/local.md"
          python -m dotagents sync --project "$proj" --remote https://example.invalid/you/.agents.git --no-pull --no-push -m "sync"
          test -f "$HOME/.agents/projects/$(basename "$proj")/plans/local.md"  # copied back
      - name: Built .pyz keeps flags/help/positional under duho 0.4.x (zipapp shim)
        run: |
          export HOME="$(mktemp -d)"
          python -m dotagents build-pyz --out dist/dotagents.pyz
          # A declared flag must NOT degrade to a name-derived one (--from, not --from-).
          python dist/dotagents.pyz init --help | grep -q -- "--from FROM"
          ! python dist/dotagents.pyz init --help | grep -q -- "--from-"
          # link/sync are DISCOVERED command modules (D76), shipped in the bundled
          # cmds dir and discovered even with an empty HOME (no install run here).
          # They must be listed AND keep their flags/help/positional through the
          # zipapp: the bundled cmds are extracted to real files before duho's AST
          # introspection reads them, so they survive without the repoint shim.
          python dist/dotagents.pyz --help | grep -q -- "link"
          python dist/dotagents.pyz --help | grep -q -- "sync"
          python dist/dotagents.pyz link --help | grep -q -- "--copy"
          ! python dist/dotagents.pyz link --help | grep -q -- "--copy-"
          python dist/dotagents.pyz link --help | grep -q -- "--store-dir STORE_DIR"
          python dist/dotagents.pyz link --help | grep -qi "Project directory to link"
          python dist/dotagents.pyz sync --help | grep -q -- "--project PROJECT"
          python dist/dotagents.pyz sync --help | grep -q -- "--no-pull"
          ! python dist/dotagents.pyz sync --help | grep -q -- "--no-pull-"
          python dist/dotagents.pyz sync --help | grep -q -- "--remote REMOTE"
          # The `link` positional must be accepted (not "unrecognized arguments").
          proj="$(mktemp -d)"; printf '.agents/\n' > "$proj/.gitignore"
          python dist/dotagents.pyz link "$proj"
          test -L "$proj/.agents"
          # The context command's flags (list --agents, --format) must survive the
          # zipapp AST-introspection degradation, and its help text must be present.
          python dist/dotagents.pyz context --help | grep -q -- "--format FORMAT"
          python dist/dotagents.pyz context --help | grep -q -- "--agents"
          python dist/dotagents.pyz context --help | grep -q -- "Output format: markdown"
          # init's --agents list flag must not degrade to a name-derived form.
          python dist/dotagents.pyz init --help | grep -q -- "--agents"
          # context --format json runs and emits parseable JSON (empty HOME -> claude).
          python dist/dotagents.pyz context --format json --agents claude -g | python -c "import sys,json; json.load(sys.stdin)"
          # env command (plan 07): --format/--diff/-g flags + help must survive the
          # zipapp AST-introspection degradation.
          python dist/dotagents.pyz env --help | grep -q -- "--format FORMAT"
          python dist/dotagents.pyz env --help | grep -q -- "--diff"
          python dist/dotagents.pyz env --help | grep -q -- "Output format. Default 'auto'"
          # env --format json runs and emits parseable JSON (identity vars stamped).
          python dist/dotagents.pyz env --diff --format json -g | python -c "import sys,json; json.load(sys.stdin)"
          # env --format export dispatches and prints export lines.
          python dist/dotagents.pyz env --format export -g | grep -q -- "export AGENT="
          # Per-shell formats (D83): each emits its own syntax through the zipapp.
          python dist/dotagents.pyz env --format powershell -g | grep -q -- "\$env:AGENT = '"
          python dist/dotagents.pyz env --format cmd -g | grep -q -- 'set "AGENT='
          python dist/dotagents.pyz env --format dotenv -g | grep -q -- "^AGENT="
          # auto (the default) resolves to a concrete format and prints SOMETHING.
          python dist/dotagents.pyz env -g | grep -q -- "AGENT"
          # overlays add: the `<name>` positional + aliased flags (--source, -g) must
          # survive the zipapp (duho AST-introspection-in-pyz gotcha). --source must
          # NOT degrade to --source-, and -g must select the user scope.
          python dist/dotagents.pyz overlays add --help | grep -q -- "--source"
          ! python dist/dotagents.pyz overlays add --help | grep -q -- "--source-"
          # --no-setup (the setup-runner escape hatch) must survive the zipapp too.
          python dist/dotagents.pyz overlays add --help | grep -q -- "--no-setup"
          ! python dist/dotagents.pyz overlays add --help | grep -q -- "--no-setup-"
          # audit + leak-check (D70): thin fronts onto the bundled _tools scripts.
          # Their flags/positional + help must survive the zipapp degradation, and
          # each must actually dispatch to the bundled tool from inside the .pyz.
          python dist/dotagents.pyz audit --help | grep -q -- "--root ROOT"
          ! python dist/dotagents.pyz audit --help | grep -q -- "--root-"
          python dist/dotagents.pyz audit --help | grep -q -- "--repo-hygiene"
          python dist/dotagents.pyz leak-check --help | grep -q -- "Repository root to scan"
          python dist/dotagents.pyz leak-check --help | grep -q -- "--commits-only"
          ! python dist/dotagents.pyz leak-check --help | grep -q -- "--commits-only-"
          # --commits-only skips the tracked-file scan: usable as a gate on THIS
          # repo, which tracks .agents/ refs (a full scan here would FAIL).
          python dist/dotagents.pyz leak-check --commits-only . | grep -q -- "PASS"
          # leak-check dispatches to the bundled leak_check.py. Scan a fresh clean
          # repo (this repo intentionally tracks .agents/ refs, so it is NOT clean).
          clean="$(mktemp -d)"; git -C "$clean" init -q
          echo hi > "$clean/README.md"; git -C "$clean" add .
          git -C "$clean" -c user.email=t@t -c user.name=t commit -q -m init
          python dist/dotagents.pyz leak-check "$clean" | grep -q -- "PASS"
          python dist/dotagents.pyz init
          python dist/dotagents.pyz overlays add python --source overlays-src/overlays -g
          test -f "$HOME/.agents/overlays/python/kb/PYTHON.md"
