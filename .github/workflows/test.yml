name: Test

# Validates the config payload: manifest completeness, forbidden patterns,
# template instantiation, and a clean install into a scratch HOME.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to test (branch, tag, or SHA)"
        required: false
        default: ""
  push:
    tags:
      - "ci-*"
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"] # default mode must run on the 3.9 floor
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Audit payload
        run: python payload/tools/audit_config.py --root payload
      - name: Repo hygiene scan (no personal leftovers in tracked files)
        run: python payload/tools/audit_config.py --repo-hygiene .
      - name: Template instantiation checks (3.11+ only)
        if: matrix.python-version != '3.9'
        run: python payload/tools/audit_config.py --check-templates --root payload

  install:
    name: Install into scratch HOME
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install the dotagents CLI package
        run: python -m pip install -e .
      - name: Dry run (minimal base overlay via init)
        run: python install.py init --dry-run
      - name: Init and audit
        run: |
          export HOME="$(mktemp -d)"
          python install.py init
          test -f "$HOME/.agents/AGENTS.md"
      - name: Install full payload and audit
        run: |
          export HOME="$(mktemp -d)"
          python install.py install --from payload
          test -f "$HOME/.agents/AGENTS.md"
          test ! -e "$HOME/.agents/examples"
          python "$HOME/.agents/tools/audit_config.py"
      - name: Install with examples (opt-in, additive only)
        run: |
          export HOME="$(mktemp -d)"
          python install.py install --from payload --with-examples
          test -f "$HOME/.agents/examples/kb/PYTHON.md"
          python install.py install --from payload --with-examples | grep -q "skip (exists)"
